<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG 라이브 드로잉 플레이그라운드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="app-header">
    <h1>✏️ SVG 드로잉 플레이그라운드</h1>
    <p>SVG 파일을 업로드하면 획 하나하나를 라이브로 그려드립니다.</p>
  </header>

  <!-- 메인 영역 -->
  <main class="app-main">

    <!-- 파일 업로드 영역 (drag & drop 지원) -->
    <div class="upload-area" id="upload-area" role="button" tabindex="0" aria-label="SVG 파일 업로드 영역">
      <span class="upload-icon">📂</span>
      <div class="upload-label">SVG 파일을 드래그하거나 클릭하여 업로드</div>
      <div class="upload-hint">.svg 파일만 지원합니다</div>
    </div>
    <!-- 실제 file input (숨김) -->
    <input type="file" id="file-input" accept=".svg,image/svg+xml" />

    <!-- 컨트롤 버튼 -->
    <div class="controls">
      <button class="btn btn-primary" id="btn-play" disabled>
        ▶ 드로잉 시작
      </button>
      <button class="btn btn-secondary" id="btn-reset" disabled>
        ↺ 리셋
      </button>
    </div>

    <!-- 상태 메시지 -->
    <div class="status-bar" id="status-bar" role="status" aria-live="polite">
      💡 SVG 파일을 업로드해 주세요.
    </div>

    <!-- SVG 미리보기 컨테이너 -->
    <div class="preview-container">
      <!-- 빈 상태 안내 메시지 -->
      <div class="preview-empty" id="preview-empty">
        <span class="empty-icon">🖼️</span>
        업로드된 SVG가 여기에 표시됩니다.
      </div>
      <!-- 실제 SVG가 삽입될 div -->
      <div id="svg-container" style="display:none;"></div>
    </div>

  </main>

  <!-- 메인 클래스 로드 -->
  <script src="svg-drawing-playground.js"></script>

  <script>
    /* ================================================================
       UI 컨트롤러
       SVG 업로드 → load() → play() → colorize() 흐름을 조율합니다.
       ================================================================ */

    // DOM 참조
    const uploadArea   = document.getElementById('upload-area');
    const fileInput    = document.getElementById('file-input');
    const btnPlay      = document.getElementById('btn-play');
    const btnReset     = document.getElementById('btn-reset');
    const statusBar    = document.getElementById('status-bar');
    const svgContainer = document.getElementById('svg-container');
    const previewEmpty = document.getElementById('preview-empty');

    // SvgDrawingPlayground 인스턴스 생성
    // [EXTEND] 옵션을 통해 스태거 딜레이, 속도 등 커스터마이즈 가능
    const playground = new SvgDrawingPlayground(svgContainer, {
      drawStaggerMs: 166,
      colorizeStaggerMs: 333,
      speedFactor: 200,
      minDuration: 0.3,
    });

    // ─── 이벤트 훅 등록 ───────────────────────────────────────────

    playground.on('loaded', ({ elementCount }) => {
      setStatus(`✅ SVG 로드 완료 — ${elementCount}개 요소 발견`, 'success');
      btnPlay.disabled = false;
      btnReset.disabled = false;
    });

    playground.on('draw-start', () => {
      setStatus('✏️ 드로잉 중...', 'drawing', true);
      btnPlay.disabled = true;
    });

    playground.on('draw-complete', ({ elementCount }) => {
      setStatus(`🎨 채색 중... (${elementCount}개 요소)`, 'drawing', true);
    });

    playground.on('colorize-complete', () => {
      // ready 이벤트에서 최종 처리
    });

    playground.on('ready', () => {
      setStatus('🌟 완료! 요소에 마우스를 올려보세요.', 'ready');
      btnPlay.disabled = false;
    });

    // ─── 파일 업로드 처리 ─────────────────────────────────────────

    // 클릭으로 파일 선택
    uploadArea.addEventListener('click', () => fileInput.click());

    // 키보드 접근성 (Enter / Space)
    uploadArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    // 파일 선택 시
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
      // 같은 파일 재선택 허용을 위해 value 초기화
      fileInput.value = '';
    });

    // 드래그 오버 스타일
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('drag-over');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('drag-over');
    });

    // 드롭 처리
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    /**
     * 선택된 파일을 FileReader로 읽어 playground에 로드합니다.
     * @param {File} file
     */
    function handleFile(file) {
      // SVG 파일 확인
      if (!file.type.includes('svg') && !file.name.endsWith('.svg')) {
        setStatus('⚠️ SVG 파일만 업로드할 수 있습니다.', '');
        return;
      }

      setStatus('⏳ 파일 읽는 중...', 'drawing', true);
      btnPlay.disabled = true;
      btnReset.disabled = true;

      const reader = new FileReader();

      reader.onload = (e) => {
        const svgString = e.target.result;

        // SVG 컨테이너 표시 / 빈 상태 숨김
        previewEmpty.style.display = 'none';
        svgContainer.style.display = 'flex';

        // playground에 SVG 로드 (전처리 포함)
        playground.load(svgString);
      };

      reader.onerror = () => {
        setStatus('❌ 파일 읽기 오류가 발생했습니다.', '');
      };

      reader.readAsText(file);
    }

    // ─── 버튼 이벤트 ──────────────────────────────────────────────

    btnPlay.addEventListener('click', () => {
      playground.reset();
      // reset 후 한 프레임 대기하여 transition이 none 상태로 확정된 뒤 play
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          playground.play();
        });
      });
    });

    btnReset.addEventListener('click', () => {
      playground.reset();
      setStatus('↺ 리셋 완료. Play를 눌러 다시 시작하세요.', 'success');
    });

    // ─── 유틸 ─────────────────────────────────────────────────────

    /**
     * 상태 바 메시지와 스타일을 업데이트합니다.
     * @param {string} text - 표시할 메시지
     * @param {string} type - '' | 'success' | 'drawing' | 'ready'
     * @param {boolean} [spinner=false] - 스피너 표시 여부
     */
    function setStatus(text, type = '', spinner = false) {
      statusBar.className = 'status-bar' + (type ? ` status-${type}` : '');
      statusBar.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + text;
    }
  </script>

</body>
</html>
